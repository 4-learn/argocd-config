apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: yillkid/docker-fastapi:2446130c728d8e8f6da9abc636bacf146cb3b5e6
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
